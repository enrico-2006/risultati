<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Tabella Risultati</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2 class="mb-4">Classifica Risultati</h2>

    <form action="/aggiungi" method="post" class="row g-3 mb-5">
        <div class="col-auto">
            <input type="text" name="nome" class="form-control" placeholder="Nome Utente" required>
        </div>
        <div class="col-auto">
            <input type="number" name="punteggio" class="form-control" placeholder="Punteggio" required>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Aggiungi</button>
        </div>
    </form>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>squadre</th>
                <th>Orario</th>
                <th>risulato</th>

            </tr>
        </thead>
        <tbody>
            {% for r in squadre %}
            <tr>
                <td>{{ r.id }}</td>
                <td>{{ r.nome }} </td>
                <td>{{ r.data }} {{ r.ora }}</td>
                <td>{{ r.score1 }} - {{ r.score2 }}</td>


            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
